<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StackMinds AI</title>

<link rel="manifest" href="/static/manifest.webmanifest">
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="phone-shell">

<header class="app-header">

<div class="logo-circle">
🧠
</div>

<p class="eyebrow">StackMinds AI</p>

<h1>From Chaos to Clarity</h1>

<p class="helper">
Dump what's in your head.
We'll organize it.
</p>

</header>


<section class="card mission-card">

<h2>Today's Mission</h2>

<p id="missionText">
One small win today.
</p>

</section>


<div class="progress-ring">

<div class="ring">

<div class="ring-inner">

5:00

</div>

</div>

</div>


<section class="input-card">

<textarea
id="ideaInput"
placeholder="What's overwhelming you today?"></textarea>

<div class="quick-buttons">

<button onclick="quickFill('I feel overwhelmed and need one tiny action.')">
Panic
</button>

<button onclick="quickFill('I need one mission for today.')">
Mission
</button>

<button onclick="quickFill('I keep procrastinating.')">
Procrastinating
</button>

<button onclick="quickFill('Everything feels messy.')">
Messy
</button>

</div>

<button
class="main-button"
onclick="runStackMinds()">

Run StackMinds

</button>

<button
class="secondary-button"
onclick="startVoiceDump()">

🎤 Voice Dump

</button>

<button
class="secondary-button"
onclick="startFocusSprint()">

Start Focus Sprint

</button>

<div
class="timer"
id="timerDisplay">

5:00

</div>

<p id="statusText">
Ready.
</p>

</section>


<section class="card highlight">

<h2>Do This Now</h2>

<p id="nextStep">

Your next step appears here.

</p>

</section>


<section class="card">

<h2>Focus Plan</h2>

<p id="focusPlan">

Your focus plan appears here.

</p>

</section>


<section class="card">

<h2>Organized Tasks</h2>

<ul id="taskList"></ul>

</section>


<section class="card">

<h2>Today's Wins</h2>

<input
id="winInput"
placeholder="Write one win..." />

<button
class="secondary-button"
onclick="saveWin()">

Save Win

</button>

<ul id="winList"></ul>

</section>


<section class="card">

<h2>Brain Dump History</h2>

<ul id="historyList"></ul>

</section>


<nav class="bottom-nav">

<button>🏠</button>

<button>🧠</button>

<button>🎯</button>

<button>📈</button>

<button>⚙️</button>

</nav>

</div>

<script src="/static/app.js"></script>

</body>
</html>
