<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StackMinds AI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="phone-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">StackMinds AI</p>
        <h1>From chaos to clarity</h1>
      </div>
    </header>

    <section class="input-card">
      <p class="helper">What is stuck in your head?</p>
      <textarea id="ideaInput" placeholder="Brain dump here..."></textarea>
      <button onclick="runStackMinds()">Run StackMinds</button>
      <p id="statusText">Ready.</p>
    </section>

    <section class="card highlight">
      <h2>Do This Now</h2>
      <p id="nextStep">Your next step will appear here.</p>
    </section>

    <section class="card">
      <h2>Focus Plan</h2>
      <p id="focusPlan">Your focus plan will appear here.</p>
    </section>

    <section class="card">
      <h2>Organized Tasks</h2>
      <ul id="taskList"></ul>
    </section>

    <section class="card">
      <h2>Brain Dump</h2>
      <p id="brainDump">Your brain dump will appear here.</p>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
