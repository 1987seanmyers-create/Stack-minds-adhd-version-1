<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StackMinds AI</title>

    <link rel="manifest" href="/static/manifest.webmanifest">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="phone-shell">

<header class="app-header">

<div class="logo-circle">
🧠
</div>

<h1>StackMinds</h1>

<p class="helper">
Turn Chaos Into Clarity
</p>

</header>

<section class="card mission-card">

<h2>Today's Mission</h2>

<p id="missionText">
One small win today.
</p>

<div class="progress-ring">

<div class="ring">

<div class="ring-inner">
0%
</div>

</div>

</div>

</section>

<section class="input-card">

<textarea
id="ideaInput"
placeholder="What's going through your mind right now?">
</textarea>

<div class="quick-buttons">

<button onclick="quickFill('I feel overwhelmed and need one tiny action.')">
😵 Overwhelmed
</button>

<button onclick="quickFill('My room is messy.')">
🧹 Clean
</button>

<button onclick="quickFill('I need to study today.')">
📚 Study
</button>

<button onclick="quickFill('I have too much work.')">
💼 Work
</button>

</div>

<button
class="main-button"
onclick="runStackMinds()">

✨ Organize My Mind

</button>

<button
class="secondary-button"
onclick="startVoiceDump()">

🎤 Talk It Out

</button>

<button
class="secondary-button"
onclick="startFocusSprint()">

⏱ Start Focus Sprint

</button>

<div
class="timer"
id="timerDisplay">

5:00

</div>

<p id="statusText">

Ready.

</p>

</section>

<section class="card highlight">

<h2>

🎯 Next Step

</h2>

<p id="nextStep">

Your next step appears here.

</p>

</section>

<section class="card">

<h2>

⚡ Focus Plan

</h2>

<p id="focusPlan">

Your focus plan appears here.

</p>

</section>

<section class="card">

<h2>

✅ Organized Tasks

</h2>

<ul id="taskList"></ul>

</section>

<section class="card">

<h2>

🏆 Win Vault

</h2>

<input
id="winInput"
placeholder="Record today's win...">

<button
class="secondary-button"
onclick="saveWin()">

Save Win

</button>

<ul id="winList"></ul>

</section>

<section class="card">

<h2>

🧠 Brain Dump History

</h2>

<ul id="historyList"></ul>

</section>

<nav class="bottom-nav">

<button>🏠</button>

<button>🧠</button>

<button>📈</button>

<button>😊</button>

<button>⚙️</button>

</nav>

</div>

<script src="/static/app.js"></script>

</body>

</html>
