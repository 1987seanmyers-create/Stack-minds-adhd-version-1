<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StackMinds AI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <div class="phone-shell">
    <header class="app-header">
      <p class="eyebrow">StackMinds AI · ADHD Focus</p>
      <h1>From chaos to clarity</h1>
      <p class="helper">Dump the chaos. Get one next step.</p>
    </header>

    <section class="input-card">
      <textarea id="ideaInput" placeholder="What is stuck in your head?"></textarea>

      <div class="quick-buttons">
        <button type="button" onclick="quickFill('I feel overwhelmed and do not know what to do first.')">Overwhelmed</button>
        <button type="button" onclick="quickFill('My room or apartment is messy and I do not know where to start.')">Messy</button>
        <button type="button" onclick="quickFill('I keep procrastinating and cannot get myself to start.')">Procrastinating</button>
        <button type="button" onclick="quickFill('I need to focus on my app or business but I do not know the next step.')">Business Focus</button>
      </div>

      <button class="main-button" onclick="runStackMinds()">Run StackMinds</button>
      <p id="statusText">Ready.</p>
    </section>

    <section class="card highlight">
      <h2>Do This Now</h2>
      <p id="nextStep">Your next step will appear here.</p>
    </section>

    <section class="card">
      <h2>Focus Plan</h2>
      <p id="focusPlan">Your focus plan will appear here.</p>
    </section>

    <section class="card">
      <h2>Organized Tasks</h2>
      <ul id="taskList"></ul>
    </section>

    <section class="card">
      <h2>Brain Dump</h2>
      <p id="brainDump">Your brain dump will appear here.</p>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
