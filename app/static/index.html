<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StackMinds AI</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="phone-shell">
    <header class="app-header">
      <p class="eyebrow">StackMinds AI · ADHD Focus</p>
      <h1>From chaos to clarity</h1>
      <p class="helper">Dump the chaos. Get one next step.</p>
    </header>

    <section class="card mission-card">
      <h2>Today’s Mission</h2>
      <p id="missionText">One small win today.</p>
    </section>

    <section class="input-card">
      <textarea id="ideaInput" placeholder="What is stuck in your head?"></textarea>

      <div class="quick-buttons">
        <button onclick="quickFill('I feel overwhelmed and need one tiny action.')">Panic Button</button>
        <button onclick="quickFill('I need one mission for today.')">Mission Mode</button>
        <button onclick="quickFill('I keep procrastinating and cannot start.')">Procrastinating</button>
        <button onclick="quickFill('My room or apartment is messy.')">Messy</button>
      </div>

      <button class="main-button" onclick="runStackMinds()">Run StackMinds</button>
      <button class="secondary-button" onclick="startVoiceDump()">🎤 Talk It Out</button>
      <button class="secondary-button" onclick="startFocusSprint()">Start 5-Min Focus Sprint</button>

      <div class="timer" id="timerDisplay">5:00</div>

      <p id="statusText">Ready.</p>
    </section>

    <section class="card highlight">
      <h2>Do This Now</h2>
      <p id="nextStep">Your next step will appear here.</p>
    </section>

    <section class="card">
      <h2>Focus Plan</h2>
      <p id="focusPlan">Your focus plan will appear here.</p>
    </section>

    <section class="card">
      <h2>Organized Tasks</h2>
      <ul id="taskList"></ul>
    </section>

    <section class="card">
      <h2>Today’s Win Vault</h2>
      <input id="winInput" placeholder="Type a small win..." />
      <button class="secondary-button" onclick="saveWin()">Save Win</button>
      <ul id="winList"></ul>
    </section>

    <section class="card">
      <h2>Brain Dump History</h2>
      <ul id="historyList"></ul>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
