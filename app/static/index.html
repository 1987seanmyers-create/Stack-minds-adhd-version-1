
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StackMinds AI · ADHD Focus</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <main class="container">
    <section class="hero">
      <p class="badge">StackMinds AI · ADHD Focus</p>
      <h1>From chaos to clarity</h1>
      <p class="subtitle">Dump what is stuck in your head. Get one clear next step.</p>
    </section>

    <section class="input-card">
      <textarea id="ideaInput" placeholder="Dump the mess here..."></textarea>
      <button onclick="runStackMinds()">Run StackMinds</button>
      <p id="statusText">Ready.</p>
    </section>

    <section class="results">
      <div class="card highlight">
        <h2>Do This Now</h2>
        <p id="nextStep">Your next step will appear here.</p>
      </div>

      <div class="card">
        <h2>Focus Plan</h2>
        <p id="focusPlan">Your focus plan will appear here.</p>
      </div>

      <div class="card">
        <h2>Organized Tasks</h2>
        <ul id="taskList"></ul>
      </div>

      <div class="card">
        <h2>Brain Dump</h2>
        <p id="brainDump">Your brain dump will appear here.</p>
      </div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
